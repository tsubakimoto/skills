# https://github.com/sugimomoto/backlogPostmanCollection
openapi: 3.0.0
info:
  title: Backlog API
  version: 1.0.0
  description: "## About Backlog\r\n\r\nBacklog is a popular cloud-based project management SaaS in Japan."
servers:
  - url: https://{your-space}.backlog.com
paths:
  /api/v2/space:
    get:
      summary: スペース情報の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースの情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-space/"
  /api/v2/space/activities:
    get:
      summary: 最近の更新の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: activityTypeId[](複数指定可)
          in: query
          description: 'type(1-26) : activityTypeId[](複数指定可)'
          schema:
            type: string
          example: <数値>
        - name: minId
          in: query
          description: '最小ID : minId'
          schema:
            type: string
          example: <数値>
        - name: maxId
          in: query
          description: '最大ID : maxId'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100) 指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
      responses: {}
      description: "# Description\r\n\r\nスペース上で行われた最近の更新の一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-recent-updates/"
  /api/v2/space/image:
    get:
      summary: スペースアイコン画像の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースのアイコン画像を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-space-logo/"
  /api/v2/space/notification:
    get:
      summary: スペースのお知らせの取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースのお知らせの情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-space-notification/"
    put:
      summary: スペースのお知らせの更新
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースのお知らせの情報を更新します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/update-space-notification/"
  /api/v2/space/diskUsage:
    get:
      summary: スペースの容量使用状況の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースの容量使用状況の情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-space-disk-usage/"
  /api/v2/space/attachment:
    post:
      summary: 添付ファイルの送信
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n課題、コメントまたはWikiに添付するファイルを送信し、添付ファイルに発行されたIDを取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/post-attachment-file/"
  /api/v2/users:
    get:
      summary: ユーザー一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースのユーザーの一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-user-list/"
    post:
      summary: ユーザーの追加
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nスペースに新しいユーザーを追加します。\nプロジェクト管理者は管理者権限のユーザを追加することは出来ません。\n新プランのスペースではこのAPIを利用できません。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/add-user/"
  /api/v2/users/{userId}:
    get:
      summary: ユーザー情報の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nユーザー情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-user/"
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    patch:
      summary: ユーザーの更新
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nユーザーの情報を更新します。\n新プランのスペースではこのAPIを利用できません。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/update-user/"
    delete:
      summary: ユーザーの削除
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nユーザーをスペースから削除します。\n新プランのスペースではこのAPIを利用できません。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/delete-user/"
  /api/v2/users/myself:
    get:
      summary: 認証ユーザー情報の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nAPIとの認証に使用しているユーザーの情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-own-user/"
  /api/v2/users/{userId}/icon:
    get:
      summary: ユーザーアイコンの取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nユーザーのアイコン画像を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-user-icon/"
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
  /api/v2/users/{userId}/activities:
    get:
      summary: ユーザーの最近の活動の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: activityTypeId[](複数指定可)
          in: query
          description: 'type(1-17) : activityTypeId[](複数指定可)'
          schema:
            type: string
          example: <数値>
        - name: minId
          in: query
          description: '最小ID : minId'
          schema:
            type: string
          example: <数値>
        - name: maxId
          in: query
          description: '最大ID : maxId'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100) 指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
      responses: {}
      description: "# Description\r\n\r\nユーザーの最近の活動の一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-user-recent-updates/"
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
  /api/v2/users/{userId}/stars:
    get:
      summary: ユーザーの受け取ったスター一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: minId
          in: query
          description: '最小ID : minId'
          schema:
            type: string
          example: <数値>
        - name: maxId
          in: query
          description: '最大ID : maxId'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100) 指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
      responses: {}
      description: "# Description\r\n\r\nユーザーの受け取ったスターの一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-received-star-list/"
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
  /api/v2/users/{userId}/stars/count:
    get:
      summary: ユーザーの受け取ったスターの数の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: since
          in: query
          description: '指定した日付以降のスターをカウント (yyyy-MM-dd) : since'
          schema:
            type: string
          example: <文字列>
        - name: until
          in: query
          description: '指定した日付以前のスターをカウント (yyyy-MM-dd) : until'
          schema:
            type: string
          example: <文字列>
      responses: {}
      description: "# Description\r\n\r\nユーザーの受け取ったスターの数を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/count-user-received-stars/"
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
  /api/v2/users/myself/recentlyViewedIssues:
    get:
      summary: 自分が最近見た課題一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
        - name: offset
          in: query
          description: ' : offset'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100)  指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
      responses: {}
      description: "# Description\r\n\r\nAPIとの認証に使用しているユーザーが最近見た課題の一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-list-of-recently-viewed-issues/"
  /api/v2/users/myself/recentlyViewedProjects:
    get:
      summary: 自分が最近見たプロジェクト一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
        - name: offset
          in: query
          description: ' : offset'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100)  指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
      responses: {}
      description: "# Description\r\n\r\nAPIとの認証に使用しているユーザーが最近見たプロジェクトの一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-list-of-recently-viewed-projects/"
  /api/v2/users/myself/recentlyViewedWikis:
    get:
      summary: 自分が最近見たWiki一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
        - name: offset
          in: query
          description: ' : offset'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100)  指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
      responses: {}
      description: "# Description\r\n\r\nAPIとの認証に使用しているユーザーが最近見たWikiの一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-list-of-recently-viewed-wikis/"
  /api/v2/groups:
    get:
      summary: グループ一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          description: '“asc&quot;または&quot;desc” 指定が無い場合は&quot;desc&quot; : order'
          schema:
            type: string
          example: <文字列>
        - name: offset
          in: query
          description: ' : offset'
          schema:
            type: string
          example: <数値>
        - name: count
          in: query
          description: '取得上限(1-100)  指定が無い場合は20 : count'
          schema:
            type: string
          example: <数値>
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          チーム一覧の取得 をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-list-of-groups/"
    post:
      summary: グループの追加
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          チームの追加 をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/add-group/"
  /api/v2/groups/{groupId}:
    get:
      summary: グループ情報の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          チーム情報の取得 をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-group/"
    parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: グループの削除
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          チームの削除  をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/delete-group/"
  '/api/v2/groups/{groupId}   ':
    patch:
      summary: グループ情報の更新
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          チーム情報の更新 をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/update-group/"
    parameters:
      - name: 'groupId   '
        in: path
        required: true
        schema:
          type: string
  /api/v2/statuses:
    get:
      summary: 状態一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n\n       warning\n           このAPIは非推奨です\n          プロジェクトの状態一覧の取得 をご利用ください。\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-status-list/"
  "/api/v2/projects/{projectIdOrKey}/statuses\n":
    get:
      summary: プロジェクトの状態一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nプロジェクト固有の課題に設定できる状態一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-status-list-of-project/"
    parameters:
      - name: projectIdOrKey
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 状態の追加
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nプロジェクトに状態を追加します。\n1プロジェクトにつき8個まで状態を追加できます。 標準の4つの状態と合わせると、合計12個の状態を設定できます。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/add-status/"
  /api/v2/priorities:
    get:
      summary: 優先度一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n課題に設定できる優先度の一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-priority-list/"
  /api/v2/resolutions:
    get:
      summary: 完了理由一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n課題に設定できる完了理由の一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-resolution-list/"
  /api/v2/projects:
    get:
      summary: プロジェクト一覧の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: archived
          in: query
          description: >-
            省略された場合は全てのプロジェクト、falseの場合はアーカイブされていないプロジェクト、trueの場合はアーカイブされたプロジェクトを返します。
            : archived
          schema:
            type: string
          example: <真偽値>
        - name: all
          in: query
          description: >-
            ユーザが管理者権限の場合のみ有効なパラメータです。trueの場合はすべてのプロジェクト、falseの場合は参加しているプロジェクトのみを返します。初期値はfalse。
            : all
          schema:
            type: string
          example: <真偽値>
      responses: {}
      description: "# Description\r\n\r\nプロジェクトの一覧を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-project-list/"
    post:
      summary: プロジェクトの追加
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\n新しいプロジェクトを追加します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/add-project/"
  /api/v2/projects/{projectIdOrKey}:
    get:
      summary: プロジェクト情報の取得
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses: {}
      description: "# Description\r\n\r\nプロジェクトの情報を取得します。\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/ja/docs/backlog/api/2/get-project/"
    parameters:
      - name: projectIdOrKey
        in: path
        required: true
        schema:
          type: string
    patch:
      summary: プロジェクト情報の更新
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
